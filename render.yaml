services:
  - type: web
    name: sportybet-ai-assistant
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: "true"
      - key: LIVE_FEEDS_ENABLED
        value: "true"
